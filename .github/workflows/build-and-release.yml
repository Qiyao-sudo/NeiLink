name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      main_version:
        description: '主版本号(1.X)'
        required: true
        type: string
      sub_version:
        description: '次/完整版本号(1.X.X)'
        required: true
        type: string
      current_tag:
        description: 'Git Tag名称(v1.X.X)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-latest
            arch: arm64
            platform: linux
          - os: windows-latest
            arch: x64
            platform: win
          - os: windows-latest
            arch: arm64
            platform: win
          - os: macos-15
            arch: x64
            platform: mac
          - os: macos-15
            arch: arm64
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装Linux ARM64交叉编译依赖
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static

      - name: 安装项目依赖
        working-directory: NeiLink
        run: npm install

      - name: 构建应用
        working-directory: NeiLink
        run: npm run build

      - name: 打包 ${{ matrix.platform }}-${{ matrix.arch }}
        working-directory: NeiLink
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: neilink-${{ inputs.sub_version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: NeiLink/release/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码（拉全量历史+所有Tag）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: 确保Tag存在（不存在则自动创建）
        id: ensure_tag
        run: |
          set -euo pipefail
          CURRENT_TAG="${{ inputs.current_tag }}"
          git fetch --tags origin

          if git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "Tag $CURRENT_TAG 已存在"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $CURRENT_TAG 不存在，自动创建"
            git tag "$CURRENT_TAG"
            git push origin "$CURRENT_TAG"
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 读取更新日志
        id: changelog
        run: |
          set -euo pipefail
          CHANGELOG_PATH="doc/Changelogs/${{ inputs.main_version }}/${{ inputs.sub_version }}/App.md"
          if [ -f "$CHANGELOG_PATH" ]; then
            {
              echo 'body<<CHANGELOG_EOF'
              cat "$CHANGELOG_PATH"
              echo 'CHANGELOG_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=No changelog found for ${{ inputs.sub_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.current_tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: artifacts/*
