name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      main_version:
        description: '主版本号(1.X)'
        required: true
        type: string
      sub_version:
        description: '次/完整版本号(1.X.X)'
        required: true
        type: string
      current_tag:
        description: 'Git Tag名称(v1.X.X)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-latest
            arch: arm64
            platform: linux
          - os: windows-latest
            arch: x64
            platform: win
          - os: windows-latest
            arch: arm64
            platform: win
          - os: macos-15
            arch: x64
            platform: mac
          - os: macos-15
            arch: arm64
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装Linux ARM64交叉编译依赖
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static

      - name: 安装项目依赖
        working-directory: NeiLink
        run: npm install

      - name: 设置版本号
        working-directory: NeiLink
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ inputs.sub_version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: 构建应用
        working-directory: NeiLink
        run: npm run build

      - name: 打包 ${{ matrix.platform }}-${{ matrix.arch }}
        working-directory: NeiLink
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}

      - name: 整理和压缩构建产物
        working-directory: NeiLink/release
        run: |
          set -euo pipefail
          V="${{ inputs.sub_version }}"
          P="${{ matrix.platform }}"
          A="${{ matrix.arch }}"

          case "$P" in
            win) PN="windows" ;;
            linux) PN="linux" ;;
            mac) PN="mac" ;;
          esac

          OUT="../NeiLink-${V}"

          # ==================== Windows ====================
          if [ "$P" = "win" ]; then
            EXE=$(find . -maxdepth 2 -type f \( -name "NeiLink-${V}-${P}-${A}.exe" -o -name "NeiLink ${V}.exe" \) \
              -not -name "*Setup*" -not -name "*.blockmap" 2>/dev/null | head -1)
            if [ -n "$EXE" ]; then
              DIR=$(dirname "$EXE"); BASE=$(basename "$EXE")
              tar -czf "${OUT}-${PN}-${A}-executable.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-${A}-executable.tar.gz"
            else
              echo "::warning::未找到 Windows 可执行文件(.exe)"
            fi

            UNP=$(find . -maxdepth 2 -type d -name "win-unpacked" 2>/dev/null | head -1)
            if [ -n "$UNP" ]; then
              DIR=$(dirname "$UNP"); BASE=$(basename "$UNP")
              tar -czf "${OUT}-${PN}-${A}-unpacked.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-${A}-unpacked.tar.gz"
            else
              echo "::warning::未找到 win-unpacked 目录"
            fi
          fi

          # ==================== Linux ====================
          if [ "$P" = "linux" ]; then
            APPIMAGE=$(find . -maxdepth 2 -type f -name "*.AppImage" 2>/dev/null | head -1)
            if [ -n "$APPIMAGE" ]; then
              DIR=$(dirname "$APPIMAGE"); BASE=$(basename "$APPIMAGE")
              tar -czf "${OUT}-${PN}-${A}-executable.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-${A}-executable.tar.gz"
            else
              echo "::warning::未找到 AppImage 文件"
            fi

            DEB=$(find . -maxdepth 2 -type f -name "*.deb" 2>/dev/null | head -1)
            if [ -n "$DEB" ]; then
              DIR=$(dirname "$DEB"); BASE=$(basename "$DEB")
              tar -czf "${OUT}-${PN}-Debian-${A}-installation.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-Debian-${A}-installation.tar.gz"
            else
              echo "::warning::未找到 .deb 文件"
            fi

            RPM=$(find . -maxdepth 2 -type f -name "*.rpm" 2>/dev/null | head -1)
            if [ -n "$RPM" ]; then
              DIR=$(dirname "$RPM"); BASE=$(basename "$RPM")
              tar -czf "${OUT}-${PN}-RedHat-${A}-installation.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-RedHat-${A}-installation.tar.gz"
            else
              echo "::warning::未找到 .rpm 文件"
            fi

            UNP=$(find . -maxdepth 2 -type d -name "linux-unpacked" 2>/dev/null | head -1)
            if [ -n "$UNP" ]; then
              DIR=$(dirname "$UNP"); BASE=$(basename "$UNP")
              tar -czf "${OUT}-${PN}-${A}-unpacked.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-${A}-unpacked.tar.gz"
            else
              echo "::warning::未找到 linux-unpacked 目录"
            fi
          fi

          # ==================== macOS ====================
          if [ "$P" = "mac" ]; then
            APP=$(find . -maxdepth 3 -type d -name "*.app" 2>/dev/null | head -1)
            if [ -n "$APP" ]; then
              DIR=$(dirname "$APP"); BASE=$(basename "$APP")
              tar -czf "${OUT}-${PN}-${A}-executable.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-${A}-executable.tar.gz"
            else
              echo "::warning::未找到 .app 应用包"
            fi

            DMG=$(find . -maxdepth 2 -type f -name "*.dmg" 2>/dev/null | head -1)
            if [ -n "$DMG" ]; then
              DIR=$(dirname "$DMG"); BASE=$(basename "$DMG")
              tar -czf "${OUT}-${PN}-${A}-installation.tar.gz" -C "$DIR" "$BASE"
              echo "已压缩: ${BASE} -> ${OUT}-${PN}-${A}-installation.tar.gz"
            else
              echo "::warning::未找到 .dmg 文件"
            fi
          fi

          echo "压缩完成，生成文件列表："
          ls -la ../NeiLink-*.tar.gz 2>/dev/null || echo "无压缩文件"
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: neilink-${{ inputs.sub_version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: NeiLink/NeiLink-*.tar.gz
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码（拉全量历史+所有Tag）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: 确保Tag存在（不存在则自动创建）
        id: ensure_tag
        run: |
          set -euo pipefail
          CURRENT_TAG="${{ inputs.current_tag }}"
          git fetch --tags origin

          if git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "Tag $CURRENT_TAG 已存在"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $CURRENT_TAG 不存在，自动创建"
            git tag "$CURRENT_TAG"
            git push origin "$CURRENT_TAG"
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 读取更新日志
        id: changelog
        run: |
          set -euo pipefail
          CHANGELOG_PATH="doc/Changelogs/${{ inputs.main_version }}/${{ inputs.sub_version }}/App.md"
          if [ -f "$CHANGELOG_PATH" ]; then
            body=$(cat "$CHANGELOG_PATH")
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$body" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=No changelog found for ${{ inputs.sub_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.current_tag }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: true
          files: artifacts/*
